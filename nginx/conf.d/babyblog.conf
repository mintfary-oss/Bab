upstream django { server web:8000; }
server {
    listen 80; server_name localhost; charset utf-8; client_max_body_size 250M;
    location /static/ { alias /var/www/static/; expires 30d; }
    location /uploads/ { alias /var/www/uploads/; expires 7d; }
    location / { proxy_pass http://django; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
}
