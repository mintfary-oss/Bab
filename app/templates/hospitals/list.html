{% extends "base.html" %}{% block title %}Роддома{% endblock %}{% block content %}<h2 class="mb-4">Роддома</h2><form method="get" class="row g-3 mb-4"><div class="col-md-5"><input name="q" class="form-control" placeholder="Поиск..." value="{{ query }}"></div><div class="col-md-3"><select name="region" class="form-select"><option value="">Все регионы</option>{% for r in regions %}<option value="{{ r }}" {% if r == selected_region %}selected{% endif %}>{{ r }}</option>{% endfor %}</select></div><div class="col-md-2"><button class="btn btn-primary w-100">Найти</button></div></form><div class="row g-3">{% for h in hospitals %}<div class="col-md-4"><div class="card shadow-sm h-100"><div class="card-body"><h5><a href="{% url 'hospitals:detail' hospital_id=h.pk %}">{{ h.name }}</a></h5><p class="text-muted small">{{ h.region }} | {{ h.address }}</p></div></div></div>{% empty %}<p class="text-muted text-center py-5">Не найдено.</p>{% endfor %}</div>{% endblock %}
