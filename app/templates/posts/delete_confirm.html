{% extends "base.html" %}{% block title %}Удаление{% endblock %}{% block content %}<div class="card shadow-sm"><div class="card-body text-center"><h4 class="text-danger">Удалить «{{ post.title }}»?</h4><form method="post">{% csrf_token %}<button class="btn btn-danger">Удалить</button> <a href="{% url 'posts:detail' post_id=post.pk %}" class="btn btn-outline-secondary">Отмена</a></form></div></div>{% endblock %}
