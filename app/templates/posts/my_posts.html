{% extends "base.html" %}{% block title %}Мои посты{% endblock %}{% block content %}<div class="d-flex justify-content-between mb-4"><h2>Мои посты</h2><a href="{% url 'posts:create' %}" class="btn btn-primary">Новый</a></div>{% for p in posts %}<div class="card shadow-sm mb-3"><div class="card-body"><h5><a href="{% url 'posts:detail' post_id=p.pk %}">{{ p.title }}</a>{% if p.status == "draft" %} <span class="badge bg-warning">Черновик</span>{% endif %}</h5><p>{{ p.body|truncatewords:30 }}</p></div></div>{% empty %}<p class="text-muted text-center py-5">Нет постов.</p>{% endfor %}{% endblock %}
