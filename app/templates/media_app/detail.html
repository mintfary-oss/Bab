{% extends "base.html" %}{% block title %}{{ media.original_name }}{% endblock %}{% block content %}<div class="card shadow-sm"><div class="card-body"><h4>{{ media.original_name }}</h4>{% if media.media_type == "image" %}<img src="{{ media.file.url }}" class="img-fluid rounded">{% elif media.media_type == "video" %}<video controls class="w-100"><source src="{{ media.file.url }}"></video>{% else %}<a href="{{ media.file.url }}" download class="btn btn-primary">Скачать</a>{% endif %}</div></div>{% endblock %}
