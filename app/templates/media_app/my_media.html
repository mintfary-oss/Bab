{% extends "base.html" %}{% block title %}Мои файлы{% endblock %}{% block content %}<h2 class="mb-4">Мои файлы ({{ total_size_mb }} МБ)</h2><div class="row g-3">{% for m in media_files %}<div class="col-6 col-md-3"><div class="card shadow-sm"><a href="{% url 'media_app:detail' media_id=m.pk %}"><div class="bg-light text-center py-4"><i class="bi bi-file-earmark fs-1"></i></div></a><div class="card-body p-2"><small>{{ m.original_name }}</small></div></div></div>{% empty %}<p class="text-muted text-center py-5">Нет файлов.</p>{% endfor %}</div>{% endblock %}
