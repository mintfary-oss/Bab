{% extends "base.html" %}{% block title %}Друзья{% endblock %}{% block content %}<h2 class="mb-4">Друзья</h2>{% if pending %}<div class="card shadow-sm mb-4"><div class="card-header bg-warning"><h5 class="mb-0">Запросы</h5></div><div class="card-body">{% for f in pending %}<div class="d-flex justify-content-between mb-2"><span>{{ f.from_user }}</span><div><a href="{% url 'chat:friend_accept' friendship_id=f.pk %}" class="btn btn-sm btn-success">OK</a> <a href="{% url 'chat:friend_reject' friendship_id=f.pk %}" class="btn btn-sm btn-outline-danger">X</a></div></div>{% endfor %}</div></div>{% endif %}{% for f in friends %}<div class="card shadow-sm mb-2"><div class="card-body">{{ f.from_user }} / {{ f.to_user }}</div></div>{% empty %}<p class="text-muted text-center py-5">Нет друзей.</p>{% endfor %}{% endblock %}
