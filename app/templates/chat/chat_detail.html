{% extends "base.html" %}{% block title %}Чат{% endblock %}{% block content %}<div class="card shadow-sm" style="min-height:400px;"><div class="card-header"><h5>{{ chat.name|default:"Чат" }}</h5></div><div class="card-body overflow-auto" style="max-height:350px;">{% for msg in messages %}<div class="mb-2 {% if msg.sender == request.user %}text-end{% endif %}"><div class="d-inline-block p-2 rounded {% if msg.sender == request.user %}bg-primary text-white{% else %}bg-light{% endif %}"><small class="fw-bold d-block">{{ msg.sender }}</small>{{ msg.body }}</div></div>{% empty %}<p class="text-muted text-center">Нет сообщений.</p>{% endfor %}</div><div class="card-footer"><form method="post" action="{% url 'chat:send' chat_id=chat.pk %}" class="d-flex">{% csrf_token %}<input name="body" class="form-control me-2" required><button class="btn btn-primary">Отправить</button></form></div></div>{% endblock %}
