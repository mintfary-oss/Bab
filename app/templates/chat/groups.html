{% extends "base.html" %}{% block title %}Группы{% endblock %}{% block content %}<div class="d-flex justify-content-between mb-4"><h2>Группы</h2><a href="{% url 'chat:group_create' %}" class="btn btn-primary">Создать</a></div><div class="row g-3">{% for g in public_groups %}<div class="col-md-4"><div class="card shadow-sm"><div class="card-body"><h5><a href="{% url 'chat:group_detail' group_id=g.pk %}">{{ g.title }}</a></h5><p class="text-muted small">{{ g.description|truncatewords:20 }}</p><span class="badge bg-secondary">{{ g.members_count }} уч.</span></div></div></div>{% empty %}<p class="text-muted text-center py-5">Нет групп.</p>{% endfor %}</div>{% endblock %}
