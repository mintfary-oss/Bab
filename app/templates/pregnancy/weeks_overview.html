{% extends "base.html" %}{% block title %}Все недели{% endblock %}{% block content %}<h2 class="mb-4">Все недели</h2><div class="progress mb-4" style="height:20px;"><div class="progress-bar bg-success" style="width:{{ pregnancy.progress_percent }}%">{{ pregnancy.current_week }} нед.</div></div><div class="d-flex flex-wrap gap-1">{% for w in weeks_range %}<a href="{% url 'pregnancy:week_detail' week_num=w %}" class="btn btn-sm {% if w == pregnancy.current_week %}btn-primary{% elif w < pregnancy.current_week %}btn-success{% else %}btn-outline-secondary{% endif %}">{{ w }}</a>{% endfor %}</div>{% endblock %}
