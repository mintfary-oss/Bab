[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app"]
[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]
[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "basic"
include = ["app"]
exclude = ["app/staticfiles"]
reportMissingImports = "warning"
reportMissingModuleSource = "warning"
